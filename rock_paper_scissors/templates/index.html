<!DOCTYPE html>
<html>
<head>
    <title>Rock Paper Scissors</title>
</head>
<body>

    <h1>Rock Paper Scissors Game</h1>

    <form action="/play" method="post">
        <button type="submit" name="player_choice" value="rock">Rock</button>
        <button type="submit" name="player_choice" value="paper">Paper</button>
        <button type="submit" name="player_choice" value="scissors">Scissors</button>
    </form>

    {% if result %}
    <div>
        <h2>Result</h2>
        <p>You chose: {{ player_choice }}</p>
        <p>Computer chose: {{ computer_choice }}</p>
        <p>{{ result }}</p>
    </div>
    {% endif %}

</body>
</html>
